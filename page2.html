<script>
const text = `La déportation est un phénomène central de la Seconde Guerre mondiale, un conflit mondial qui se déroule de 1939 à 1945 et qui oppose notamment l’Allemagne nazie à de nombreux pays européens. Après l’arrivée au pouvoir d’Adolf Hitler en 1933, le régime nazi met en place une dictature fondée sur une idéologie raciste et antisémite, qui considère certains peuples comme inférieurs. Dès avant la guerre, des lois discriminatoires sont instaurées pour exclure les Juifs de la société. Avec le déclenchement de la guerre et l’occupation de nombreux territoires en Europe, notamment la France, cette politique se radicalise fortement.

Dans ce contexte, la déportation devient un outil essentiel du régime nazi. Elle consiste à arrêter des populations entières pour les envoyer de force vers l’Est de l’Europe, dans des camps. Elle a lieu pour plusieurs raisons : éliminer les populations jugées “indésirables”, exploiter une main-d’œuvre forcée pour soutenir l’effort de guerre, et surtout mettre en œuvre une politique d’extermination systématique. À partir de 1941-1942, les nazis organisent ce que l’on appelle la “solution finale”, c’est-à-dire le génocide des Juifs d’Europe.

Concrètement, les personnes visées — principalement les Juifs, mais aussi les Roms, les résistants, les opposants politiques ou encore les personnes handicapées — sont arrêtées lors de rafles, souvent avec l’aide des autorités locales dans les pays occupés. Elles sont ensuite regroupées dans des camps de transit, puis déportées dans des trains surpeuplés, dans des conditions très dures (manque d’eau, de nourriture, d’air). Le voyage peut durer plusieurs jours. À leur arrivée dans des camps comme Auschwitz-Birkenau, les déportés subissent une sélection : certains sont envoyés directement à la mort, d’autres sont contraints au travail forcé dans des conditions inhumaines. La déportation s’inscrit donc dans un contexte de guerre totale et de violence extrême, où un État utilise tous les moyens pour persécuter, exploiter et exterminer des populations entières.`;

const smallImageSrc = 'https://sfi.usc.edu/sites/default/files/styles/large/public/89277106_web.jpg?itok=7foJyg5A';
const largeImageSrc = 'https://encyclopedia.ushmm.org/images/large/e9e1e918-5894-45e5-862c-9f6667b51a9d.jpeg';

// ✨ Sources
const smallCaption = "Source : USC Shoah Foundation";
const largeCaption = "Source : United States Holocaust Memorial Museum";

// Injection
document.getElementById('textContent').textContent = text;
document.getElementById('smallImage').src = smallImageSrc;
document.getElementById('largeImage').src = largeImageSrc;

document.getElementById('smallCaption').textContent = smallCaption;
document.getElementById('largeCaption').textContent = largeCaption;
